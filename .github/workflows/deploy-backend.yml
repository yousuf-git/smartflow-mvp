name: Deploy Backend to Heroku

on:
  push:
    branches: [main]
    paths:
      - "smartflow.server/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Heroku via git subtree
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git
          git push heroku $(git subtree split --prefix=smartflow.server HEAD):refs/heads/main --force
